<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Category Form</title>
</head>
<body>
    <div layout:fragment="content" class="container body-content mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h4>Thêm danh mục mới</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/categories/save}" th:object="${category}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Tên danh mục</label>
                                <input type="text"
                                       class="form-control"
                                       id="name"
                                       th:field="*{name}"
                                       placeholder="Nhập tên danh mục">
                                <!-- Hiển thị lỗi validation nếu có -->
                                <div class="text-danger" th:if="${#fields.hasErrors('name')}"
                                     th:errors="*{name}"></div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">Lưu</button>
                                <a th:href="@{/categories}" class="btn btn-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
