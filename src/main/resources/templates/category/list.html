<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Category List</title>
</head>
<body>
    <div layout:fragment="content" class="container body-content mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Danh sách danh mục</h2>
            <a th:href="@{/categories/add}" class="btn btn-primary">+ Thêm danh mục</a>
        </div>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Tên danh mục</th>
                    <th scope="col" class="text-center">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <th scope="row" th:text="${category.id}"></th>
                    <td th:text="${category.name}"></td>
                    <td class="text-center">
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}"
                           class="btn btn-secondary btn-sm">Sửa</a>

                        <form th:action="@{/categories/delete/{id}(id=${category.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                            <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="3" class="text-center text-muted">Chưa có danh mục nào.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
